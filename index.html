<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Work Hub — щоденні задачі</title>
  <meta name="theme-color" content="#2ea3f2" />
  <meta name="description" content="Мобільний трекер щоденних робочих задач: рутина, розвиток бізнесу, статистика та цілі." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Work Hub" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

  <!-- Верхня панель -->
  <header class="topbar">
    <button class="icon-btn" id="btn-menu" aria-label="Меню">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M4 7h16M4 13h11M4 19h16"/></svg>
    </button>
    <div class="brand">
      <svg class="gauge" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <path d="M6 26 A14 14 0 1 1 30 26" stroke="var(--border)" stroke-width="4" stroke-linecap="round"/>
        <path id="gauge-fill" d="M6 26 A14 14 0 1 1 30 26" stroke="#e2483d" stroke-width="4" stroke-linecap="round" stroke-dasharray="60" stroke-dashoffset="40"/>
        <line id="gauge-needle" x1="18" y1="20" x2="26" y2="16" stroke="var(--text)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <button class="icon-btn" id="btn-today" aria-label="Сьогодні">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/><text x="12" y="18" font-size="7" font-weight="700" text-anchor="middle" fill="currentColor" stroke="none" id="today-num">8</text></svg>
    </button>
  </header>

  <!-- Екран задач -->
  <main class="screen active" id="screen-tasks"></main>

  <!-- Екран статистики -->
  <main class="screen" id="screen-stats"></main>

  <!-- Екран цілей -->
  <main class="screen" id="screen-goals"></main>

  <!-- FAB -->
  <button class="fab" id="fab" aria-label="Додати">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <!-- Нижня навігація -->
  <nav class="tabbar" id="tabbar">
    <button data-tab="tasks" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6h11M9 12h11M9 18h11"/><path d="M4 6l1 1 2-2M4 12l1 1 2-2M4 18l1 1 2-2"/></svg>
      <span>Задачі</span>
    </button>
    <button data-tab="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      <span>Статистика</span>
    </button>
    <button data-tab="goals">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>
      <span>Цілі</span>
    </button>
  </nav>

  <!-- Бічне меню (фільтр за списками) -->
  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer"></aside>

  <!-- Нижня шторка (форми) -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <section class="sheet" id="sheet"></section>

  <div class="toast" id="toast"></div>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
